apiVersion: v1
kind: ConfigMap
metadata:
  name: s3-input-download-scripts
data:
  s3_download.py: |
    import sys
    import os
    import time
    import boto3
    from botocore.exceptions import ClientError, NoCredentialsError

    def download_file_from_s3(bucket_name, s3_key, local_path, endpoint_url=None, max_retries=3):
        """
        Download a file from S3/Minio bucket with retry mechanism

        Args:
            bucket_name: Name of the S3 bucket
            s3_key: S3 object key (path in bucket)
            local_path: Local path to save the downloaded file
            endpoint_url: Optional S3 endpoint URL for non-AWS S3 (e.g., Minio)
            max_retries: Maximum number of download attempts (default: 3)

        Returns:
            str: The local path where file was downloaded

        Raises:
            Exception: If download fails after all retry attempts
        """
        print(f"S3/Minio Downloader Initialized.")
        print(f"Source: s3://{bucket_name}/{s3_key}")
        print(f"Destination: {local_path}")
        if endpoint_url:
            print(f"Endpoint: {endpoint_url}")

        # create S3 client
        s3_client_kwargs = {}
        if endpoint_url:
            s3_client_kwargs['endpoint_url'] = endpoint_url

        # disable SSL verification for self-signed certificates
        s3_client_kwargs['verify'] = False

        s3_client = boto3.client('s3', **s3_client_kwargs)

        # ensure download directory exists
        os.makedirs(os.path.dirname(local_path), exist_ok=True)

        # retry logic for file download
        for attempt in range(max_retries):
            try:
                print(f"Download attempt {attempt + 1} of {max_retries}")

                # Check if object exists first
                try:
                    s3_client.head_object(Bucket=bucket_name, Key=s3_key)
                except ClientError as e:
                    if e.response['Error']['Code'] == '404':
                        print(f"ERROR: S3 object not found: s3://{bucket_name}/{s3_key}")
                        raise

                # Download the file
                s3_client.download_file(bucket_name, s3_key, local_path)

                print(f"File downloaded successfully on attempt {attempt + 1}!")
                print(f"Downloaded to: {local_path}")

                # Verify file was downloaded
                if os.path.exists(local_path):
                    file_size = os.path.getsize(local_path)
                    print(f"File size: {file_size} bytes")
                else:
                    raise Exception(f"Download reported success but file not found: {local_path}")

                return local_path

            except NoCredentialsError as e:
                # credentials error is not retryable - raise immediately
                print("ERROR: No AWS credentials found")
                print("Please ensure AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are set")
                raise

            except ClientError as e:
                error_code = e.response['Error']['Code']
                error_message = e.response['Error']['Message']
                print(f"S3 ClientError on attempt {attempt + 1}: ({error_code}): {error_message}")

                if error_code == 'NoSuchBucket':
                    print(f"ERROR: S3 bucket not found: {bucket_name}")
                    raise

                if attempt < max_retries - 1:
                    wait_time = 2 ** attempt  # Exponential backoff: 1, 2, 4 seconds
                    print(f"Waiting {wait_time} seconds before retry...")
                    time.sleep(wait_time)
                else:
                    print("All download attempts failed")
                    raise

            except Exception as e:
                print(f"Unexpected error on attempt {attempt + 1}: {e}")

                if attempt < max_retries - 1:
                    wait_time = 2 ** attempt  # Exponential backoff: 1, 2, 4 seconds
                    print(f"Waiting {wait_time} seconds before retry...")
                    time.sleep(wait_time)
                else:
                    print("All download attempts failed")
                    raise

        # This should never be reached, but just in case
        raise Exception("Download failed after all retry attempts")

    def main():
        try:
          # check for credentials
          if not all(os.environ.get(k) for k in ['AWS_ACCESS_KEY_ID', 'AWS_SECRET_ACCESS_KEY']):
            print("S3 credentials not found in environment variables.")
            print("Ensure AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are set via a secret.")
            return 1

          if len(sys.argv) < 4:
              print("Usage: python s3_download.py <bucket_name> <s3_key> <local_path> [endpoint_url]")
              return 1

          # get parameters
          bucket_name = sys.argv[1]
          s3_key = sys.argv[2]
          local_path = sys.argv[3]
          endpoint_url = sys.argv[4] if len(sys.argv) > 4 else None

          # Download file from S3 with retry mechanism
          downloaded_path = download_file_from_s3(bucket_name, s3_key, local_path, endpoint_url)

          print("=== Download completed successfully! ===")
          return 0

        except Exception as e:
            print(f"ERROR: Download failed - {str(e)}")
            import traceback
            traceback.print_exc()
            return 1

    if __name__ == "__main__":
        sys.exit(main())

  download_from_s3.sh: |
    #!/bin/bash
    set -e

    echo "=== STEP 0: DOWNLOAD SARIF FROM S3 ==="

    # Check if S3 download is enabled
    if [ -z "$INPUT_S3_KEY" ] || [ -z "$S3_INPUT_BUCKET_NAME" ]; then
      echo "S3 download disabled: INPUT_S3_KEY or S3_INPUT_BUCKET_NAME not provided"
      echo "Skipping S3 download step"
      exit 0
    fi

    echo "Bucket: $S3_INPUT_BUCKET_NAME"
    echo "Key: $INPUT_S3_KEY"

    # Create download directory
    mkdir -p /shared-data/s3-downloads

    # Extract filename from S3 key
    FILENAME=$(basename "$INPUT_S3_KEY")
    DOWNLOAD_PATH="/shared-data/s3-downloads/$FILENAME"

    # Run Python download script
    python3 /scripts/s3-download/s3_download.py \
      "$S3_INPUT_BUCKET_NAME" \
      "$INPUT_S3_KEY" \
      "$DOWNLOAD_PATH" \
      "${S3_ENDPOINT_URL:-}"

    # Update INPUT_REPORT_FILE_PATH for subsequent steps
    export INPUT_REPORT_FILE_PATH="$DOWNLOAD_PATH"
    echo "Downloaded SARIF to: $INPUT_REPORT_FILE_PATH"

    # Save to shared file for other steps
    echo "INPUT_REPORT_FILE_PATH=$INPUT_REPORT_FILE_PATH" >> /shared-data/s3-env.txt

    echo "=== S3 download completed successfully ==="
