PROJECT_NAME: ""
PROJECT_VERSION: ""

LLM_URL: "http://<<please-set-llm-url>>"
LLM_API_TYPE: "nim"
LLM_MODEL_NAME: "llm-model"
EMBEDDINGS_LLM_URL: "http://<<please-set-embedding-llm-url>>"
EMBEDDINGS_LLM_MODEL_NAME: "embedding-llm-model"

EMBEDDING_HTTP_POOL_ENABLED: true
EMBEDDING_HTTP_POOL_SIZE: 5
EMBEDDING_HTTP_POOL_TTL_SECONDS: 300
EMBEDDING_HTTP_VERIFY_SSL: false  # Set to true for production with valid certificates

INPUT_REPORT_FILE_PATH: "/path/to/report.html"
KNOWN_FALSE_POSITIVE_FILE_PATH: "/path/to/known_false_positives_file"
OUTPUT_FILE_PATH: "/path/to/output_excel.xlsx"
AGGREGATE_RESULTS_G_SHEET: ""
HUMAN_VERIFIED_FILE_PATH: ""
DOWNLOAD_REPO: false
REPO_REMOTE_URL: ""
REPO_LOCAL_PATH: "/path/to/repo"
LIBCLANG_PATH: "/path/to/libclang"
CONFIG_H_PATH: ""
COMPILE_COMMANDS_JSON_PATH: ""
SERVICE_ACCOUNT_JSON_PATH: ""

USE_KNOWN_FALSE_POSITIVE_FILE: true
CALCULATE_RAGAS_METRICS: false
WRITE_RESULTS_INCLUDE_NON_FINAL: true

SHOW_FINAL_JUDGE_CONTEXT: true
SIMILARITY_ERROR_THRESHOLD: 2
MAX_ANALYSIS_ITERATIONS: 2

# Investigation Configuration
MAX_RESEARCH_ITERATIONS: 5
MAX_REJECTION_STREAK: 3
MAX_NO_PROGRESS_STREAK: 2
RESEARCH_RECURSION_LIMIT: 30
STRUCTURED_OUTPUT_MAX_RETRIES: 3

RUN_WITH_CRITIQUE: false
USE_CRITIQUE_AS_FINAL_RESULTS: false
CRITIQUE_LLM_URL: ""
CRITIQUE_LLM_MODEL_NAME: ""

# Embedding Configuration
EMBEDDINGS_MAX_INPUT_TOKENS: 384

# Confidence Scoring Configuration
CONFIDENCE_WEIGHT_FILTER: 0.20  # Initial filtering decision confidence
CONFIDENCE_WEIGHT_AGENT: 0.30  # LLM's internal verdict confidence (HIGH/MEDIUM/LOW)
CONFIDENCE_WEIGHT_EVIDENCE: 0.20  # Quality and quantity of supporting evidence
CONFIDENCE_WEIGHT_INVESTIGATION: 0.30  # Investigation thoroughness metrics

# Evidence sub-component weights
EVIDENCE_WEIGHT_FAISS_SCORE: 0.40  # FAISS vector similarity score
EVIDENCE_WEIGHT_FILES_FETCHED: 0.30  # Number of source files retrieved
EVIDENCE_WEIGHT_EVIDENCE_COUNT: 0.30  # Code snippets, CVEs, file references

# Investigation sub-component weights
INVESTIGATION_WEIGHT_DEPTH: 0.25  # Symbols/functions explored beyond initial trace
INVESTIGATION_WEIGHT_TOOL_CALLS: 0.25  # Total tool calls during research
INVESTIGATION_WEIGHT_REANALYSIS: 0.25  # Reanalysis cycles (iterative refinement)
INVESTIGATION_WEIGHT_STOP_REASON: 0.25  # How investigation ended (approved/limits/no_progress)

# Normalization caps for evidence and investigation metrics
CONFIDENCE_MAX_FILES_FOR_NORMALIZATION: 10
CONFIDENCE_MAX_EVIDENCE_ITEMS_FOR_NORMALIZATION: 5
CONFIDENCE_MAX_SYMBOLS_FOR_NORMALIZATION: 5
CONFIDENCE_MAX_TOOL_CALLS_FOR_NORMALIZATION: 20
CONFIDENCE_MAX_REANALYSIS_FOR_NORMALIZATION: 3

# Stop reason confidence scores (0.0-1.0 scale)
STOP_REASON_SCORE_APPROVED: 1.0  # Investigation completed successfully
STOP_REASON_SCORE_MAX_ITERATIONS: 0.6  # Hit iteration limit but gathered evidence
STOP_REASON_SCORE_NO_PROGRESS: 0.3  # Investigation stalled with no new information
STOP_REASON_SCORE_UNKNOWN: 0.2  # Unknown stop reason - default low confidence

CHUNK_SIZE: 500
CHUNK_OVERLAP: 0
CHUNK_SEPARATORS:
  - "\n\n"
  - "\n"
  - "."
  - ";"
  - ","
  - " "
  - ""
