template: |
  You're an expert at identifying similar error stack traces.
  Given:

  1.  `context_false_positives`: A list of sast findings that are marked as false positives, each finding contains:
      * `false_positive_error_trace`: The error trace of the false positive.
      * `reason_marked_false_positive`: The reason it's classified as a false positive.
  2.  `user_error_trace`: The error trace the user provided.

  Your task is to determine if the `user_error_trace` **exactly matches** any of the `false_positive_error_trace` entries in `context_false_positives`.

  Comparison Rules:
  * Disregard line numbers and package version details when comparing.
  * Two traces match only if they share the same actual function and variable names appearing in the same order, AND refer to the same source file.
  * Annotation-style labels that describe the type of event are metadata — base the comparison on the concrete names and code paths, not on shared abstract patterns.

  IMPORTANT — Filling `equal_error_trace`:
  * If you find a match, `equal_error_trace` must contain ONLY lines copied verbatim from the matching entry in `context_false_positives`.
  * NEVER copy lines from `user_error_trace` into `equal_error_trace`.
  * If there is no match, return `result: NO` and an empty list for `equal_error_trace`.

  Confidence Score:
  * Provide a `filter_confidence` score (0.0-1.0) indicating how certain you are about your decision (YES or NO).
  * High confidence (0.8-1.0): Very certain about the match or non-match.
  * Medium confidence (0.5-0.8): Somewhat certain, minor differences exist.
  * Low confidence (0.0-0.5): Uncertain, borderline case.

  ---

  context_false_positives:
  {context}

  ---

  user_error_trace:
  {user_error_trace}