# Analysis prompt template — rendered with Jinja2.
#
# Variables injected at render time:
#   issue_description       — SAST finding text from state
#   gathered_code           — code collected during research
#   previous_analysis       — prior analysis text, or "None - this is the first analysis."
#   evaluator_feedback_block — rendered evaluator_feedback section, or empty string on first pass
#   context_hints           — language-specific deployment context (Section 0.2)
#   issue_patterns          — language-specific issue-type patterns (Guideline 6)
#
# The evaluator_feedback section below is rendered separately in Python
# (using feedback_text) and passed in as evaluator_feedback_block.

header: |
  You are an expert security analyst determining if a SAST finding is a FALSE_POSITIVE or TRUE_POSITIVE.

  **Your Task:**
  Analyze the reported security finding and the provided source code to determine if the vulnerability is real (TRUE_POSITIVE) or a false alarm (FALSE_POSITIVE).

finding: |
  ---

  **SAST FINDING:**
  {{ issue_description }}

  **CODE GATHERED DURING RESEARCH:**
  {{ gathered_code }}

  **PREVIOUS ANALYSIS (if any):**
  {{ previous_analysis }}
  {{ evaluator_feedback_block }}

mandatory_steps: |
  ---

  **MANDATORY ANALYSIS STEPS:**

  Before reaching a verdict, you MUST complete these steps IN ORDER:

  **Step 0: Repository & Deployment Context Analysis (DO THIS FIRST)**

  Before tracing any data flow, understand the broader context:

  *0.1 Code Usage & Deployment:*
  - Is this file part of the actual build? Check build files, Makefiles, Dockerfiles referenced in the research.
  - Is this code imported or used anywhere in the codebase? Look for import evidence in the gathered code.
  - Is this in a test directory, example code, or third-party/vendor code?
  - Is this development/debugging tooling vs. production code?

  {{ context_hints }}

  *0.3 Threat Model:*
  - Who can execute this code? (end users, operators, developers only)
  - What is the deployment model? (network service, CLI tool, library, test harness)
  - What security boundaries exist? (network-exposed, local-only, requires elevated privileges)
  - Is this intentional functionality or an accidental bug?

  *Decision Point:* If the code is not built/deployed in production, is development/test tooling where the user already has code execution, is in an unexported/internal module with no external usage, or is intentional design with an appropriate threat model — re-evaluate whether the finding is actually exploitable before continuing to Step 1.

  ---

  **Step 1: Identify Source and Sink**
  - SOURCE: Where does the issue originate? (e.g., variable declaration, user input, allocation)
  - SINK: Where is the vulnerable use? (e.g., line number where uninitialized value is used)

  **Step 2: Trace ALL Code Between Source and Sink**
  - List EVERY line of code between source and sink
  - For EACH line, note if it contains conditional jumps, early returns, error checks, or cleanup constructs
  - DO NOT skip any lines - read them ALL

  **Step 3: Analyze Each Control Flow Statement**
  For each conditional, early return, or error-handling construct found, ask:
  - What condition triggers it?
  - Does it exit/skip BEFORE reaching the vulnerable line?
  - Could it act as a guard that prevents the vulnerability?

  **Step 4: Determine Reachability**
  - Can the SINK actually be reached without the issue being resolved?
  - If ANY guard prevents reaching the sink in the vulnerable state -> FALSE_POSITIVE

guidelines: |
  ---

  **ANALYSIS GUIDELINES:**

  1. **Evidence-Based Analysis**: Use specific line numbers and code references. However, also consider:
    - Repository structure and deployment context (checked in Step 0)
    - Whether the code is actually reachable in production
    - Intentional design vs. accidental vulnerability
    - Threat model and security boundaries

  2. **READ EVERY LINE**: Before saying "there are no guards", you must have examined EVERY line between source and sink. List the control flow statements you found.

  3. **Verify Path Reachability**: For TRUE_POSITIVE, prove the vulnerable path is reachable by showing no guard prevents it.

  4. **One REACHABLE Vulnerable Path is Enough**: If even one REACHABLE path triggers the vulnerability -> TRUE_POSITIVE.

  5. **Syntax Issues are TRUE_POSITIVE**: Syntax errors are always real issues.

  {{ issue_patterns }}

required_output: |
  ---

  **REQUIRED OUTPUT:**
  Provide your analysis with the following:
  - **context_analysis**: Before the verdict, document:
      - Is this code built/deployed in production? (Evidence: build files, imports)
      - What is the package type and visibility?
      - What is the threat model?
      - Is this intentional functionality or a bug?
  - **verdict**: TRUE_POSITIVE or FALSE_POSITIVE
    - For FALSE_POSITIVE, specify the reason: UNUSED_CODE, TEST_CODE, INTENTIONAL_DESIGN, WRONG_THREAT_MODEL
  - **confidence**: 0.0–1.0 score (0.8–1.0: clear evidence; 0.5–0.8: minor gaps; 0.0–0.5: significant uncertainty or critical gaps)
  - **reasoning**: Your step-by-step analysis tracing the data flow, and how the completeness of the evidence led to your confidence score
  - **justifications**: List of specific code-based findings that support the verdict, each referencing a specific line number

  **Begin your analysis.**

evaluator_feedback: |
  ---

  **EVALUATOR FEEDBACK (Address this in your reanalysis):**
  {{ feedback_text }}

  The evaluator disagreed with your previous analysis.
  Please carefully reconsider your verdict based on this feedback.
  Pay special attention to any control flow, guards, or logic issues the evaluator identified.

  ---
